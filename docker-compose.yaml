services:
  db:
    image: postgres:latest
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_DB: ${DB_NAME}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5436:5432"

  enrichment-service:
    build: ./
    command: ./bin/api
    ports:
      - 8080:8080
    depends_on:
      db:
        condition: service_healthy
      migrate-reset:
        condition: service_completed_successfully
    environment:
      ADDR: ${ADDR}
      CONCURRENCY: ${CONCURRENCY}
      DB_ADDR: ${DB_ADDR}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_MAX_OPEN_CONNS: ${DB_MAX_OPEN_CONNS}
      DB_MAX_IDLE_CONNS: ${DB_MAX_IDLE_CONNS}
      DB_MAX_IDLE_TIME: ${DB_MAX_IDLE_TIME}

  migrate-reset:
    image: migrate/migrate:latest
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./internal/db/migrations:/migrations
    entrypoint:
      - sh
      - -c
    command:
      - |
        set -e
        echo "=== Rolling back ==="
        migrate -path=/migrations -database "postgres://enricher_user:enricher_pwd@db:5432/enrich?sslmode=disable" down --all || true
        echo "=== Applying migrations ==="
        migrate -path=/migrations -database "postgres://enricher_user:enricher_pwd@db:5432/enrich?sslmode=disable" up
    restart: "no"


volumes:
  db-data:
